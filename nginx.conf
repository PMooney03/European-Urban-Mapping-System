events {
    worker_connections 1024;
}

http {
    upstream django {
        server django:8000;
    }

    server {
        listen 80;
        
        # Serve static files from collected staticfiles directory
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Service worker must be served from root with correct MIME type
        location /service-worker.js {
            alias /app/staticfiles/service-worker.js;
            add_header Content-Type application/javascript;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        
        # Manifest must be served with correct MIME type
        location /manifest.json {
            alias /app/staticfiles/manifest.json;
            add_header Content-Type application/manifest+json;
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Proxy all other requests to Django
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}


